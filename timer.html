<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
        <title>Focus Timer | Page Zero</title>
    
        <link rel="stylesheet" href="styles/general.css">
        <link rel="stylesheet" href="styles/timer.css">
    </head>

    <body>
        <div id="top-row" class="flex-split-row glass-container">
            <div id="top-title-container" class="flex-centered-row">
                <p id="top-title">P<sub>0</sub></p>
                <h3 id="top-tool-title">Focus Timer</h3>
            </div>
            <div id="top-buttons-container" class="flex-centered-row">
                <a href="datamanager.html" id="data-manager-button" class="hover-label" data-label="Data Manager" data-position="bottom"><img src="assets/images/database-config.svg" alt="Data Manager" class="top-icon" draggable="false"></a>
            </div>
        </div>

        <div id="main-container" class="onload-wrapper">
            <div id="left-nav" class="flex-column glass-container">
                <div class="nav-item centered-div hover-label" data-label="Home" data-position="right">
                    <a href="index.html"><img src="assets/images/home.svg" alt="Home" class="nav-icon" draggable="false"></a>
                </div>
                <div class="nav-item centered-div hover-label" data-label="Web Chest" data-position="right">
                    <a href="webchest.html"><img src="assets/images/chest.svg" alt="Web Chest" class="nav-icon" draggable="false"></a>
                </div>
                <div class="nav-item centered-div hover-label" data-label="To-do" data-position="right">
                    <a href="todo.html"><img src="assets/images/todo.webp" alt="To-do" class="nav-icon" draggable="false" style="width: 42px;"></a>
                </div>
                <div class="nav-item centered-div hover-label nav-active" data-label="Focus Timer" data-position="right">
                    <a href="timer.html"><img src="assets/images/timer.svg" alt="Focus Timer" class="nav-icon" draggable="false" style="width: 42px;"></a>
                </div>
                <div class="nav-item centered-div hover-label" data-label="Calculator" data-position="right">
                    <a href="calculator.html"><img src="assets/images/calculator.svg" alt="Calculator" class="nav-icon" draggable="false" style="width: 36px;"></a>
                </div>
                <div class="nav-item centered-div nav-tray-container hover-label" data-label="More Tools" data-position="bottom">
                    <img src="assets/images/applib.webp" alt="More Tools" class="nav-icon" draggable="false" style="width: 36px;">
                    <div class="nav-tray glass-container glass-bg flex-centered-row">
                        <div class="nav-item centered-div hover-label" data-label="Gradebook" data-position="top">
                            <a href="gradebook.html"><img src="assets/images/gradebook.svg" alt="Gradebook" class="nav-icon" draggable="false" style="width: 30px;"></a>
                        </div>
                        <div class="nav-item centered-div hover-label" data-label="Trending Media" data-position="top">
                            <a href="trending.html"><img src="assets/images/trending.svg" alt="Trending Media" class="nav-icon" draggable="false" style="width: 36px;"></a>
                        </div>
                        <div class="nav-item centered-div hover-label" data-label="RSS Feeds" data-position="top">
                            <a href="rss.html"><img src="assets/images/rss.svg" alt="RSS Feeds" class="nav-icon" draggable="false" style="width: 30px;"></a>
                        </div>
                        <div class="nav-item centered-div hover-label" data-label="Photos Viewer" data-position="top">
                            <a href="photos.html"><img src="assets/images/photos.svg" alt="Photos Viewer" class="nav-icon" draggable="false" style="width: 36px;"></a>
                        </div>
                        <div class="nav-item centered-div hover-label" data-label="World Globe" data-position="top">
                            <a href="worldglobe.html"><img src="assets/images/world-globe.svg" alt="World Globe" class="nav-icon" draggable="false" style="width: 30px;"></a>
                        </div>
                    </div>
                </div>
            </div>

            <div id="main-content" class="flex-column">
                <div id="tool-top-container" class="section-container flex-centered-row">
                    <div id="header-top-buttons" class="flex-centered-row flex-align-right">
                        <div id="page-settings">
                            <div class="header-top-button circular-button hover-label" data-label="Settings" data-position="bottom">
                                <img src="assets/images/settings.svg" alt="Settings" draggable="false">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="timer-tool-container" class="section-container flex-split-row flex-start-section">
                    <div id="timer-main-container" class="flex-column glass-container">
                        <div id="timer-display" class="centered-div">
                            <div id="timer-time" class="centered-div">
                                <span id="timer-hours" class="timer-time-val"></span>
                                <span class="timer-separator">H</span>
                                <span id="timer-minutes" class="timer-time-val"></span>
                                <span class="timer-separator">M</span>
                                <span id="timer-seconds" class="timer-time-val"></span>
                                <span class="timer-separator">S</span>
                            </div>
                            <svg id="timer-progress-border" viewBox="0 0 100 100" fill="none">
                                <circle id="timer-progress-border-elapsed" cx="50%" cy="50%" r="45" stroke-width="2"></circle>
                                <circle id="timer-progress-border-remaining" cx="50%" cy="50%" r="45" stroke-width="2"></circle>
                            </svg>
                        </div>

                        <div id="timer-control-container">
                            <div id="timer-start-control" class="timer-control centered-div dimensional-button hover-label" data-position="bottom">
                                <img id="timer-start-control-icon" class="timer-control-icon" draggable="false">
                            </div>
                            <div id="timer-end-control" class="timer-control centered-div dimensional-button hover-label" data-label="End timer & Start break" data-position="bottom">
                                <img id="timer-end-control-icon" class="timer-control-icon" src="assets/images/stop.svg" draggable="false">
                            </div>
                            <div id="timer-rewind-control" class="timer-control centered-div dimensional-button hover-label" data-label="Rewind to set time" data-position="bottom">
                                <img id="timer-rewind-control-icon" class="timer-control-icon" src="assets/images/rewind.svg" draggable="false">
                                <p id="timer-rewind-text"></p>
                            </div>
                        </div>
                    </div>
                    <div id="timer-right-container" class="flex-column">
                        <div class="timer-right-section right-panel-section flex-column glass-container">
                            <h3 class="right-panel-header">Quick Timers</h3>
                            <div id="quick-timer-list">
                                <p class="quick-timer-item centered-div" data-time="1800">30m</p>
                                <p class="quick-timer-item centered-div" data-time="3600">1h</p>
                                <p class="quick-timer-item centered-div" data-time="5400">1h 30m</p>
                            </div>
                        </div>

                        <div class="timer-right-section right-panel-section flex-column glass-container">
                            <div id="timer-page-stat-dropdown" class="right-panel-row flex-centered-row">
                                <h3 class="right-panel-header">Session Stats</h3>
                            </div>
                            <div id="timer-page-stat-content" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>



        <script src="scripts/helpers/cookie.js"></script>
        <script src="scripts/helpers/genelem.js"></script>
        <script src="scripts/helpers/gensvg.js"></script>
        <script src="scripts/helpers/datetime.js"></script>
        <script src="scripts/helpers/database.js"></script>
        <script src="scripts/helpers/parsing.js"></script>
        <script src="scripts/timer.js"></script>
    </body>
</html>
